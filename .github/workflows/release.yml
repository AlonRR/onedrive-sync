name: release

# Build the Windows binaries and publish a GitHub Release whenever a version tag
# (v0.1.0, v1.2.3, …) is pushed. The `v*.*.*` pattern deliberately does NOT match
# the historical `v1.0-powershell` tag. Can also be run manually for an existing tag.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build a release for, e.g. v0.1.0'
        required: true

permissions:
  contents: write   # needed to create the Release and upload assets

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
          fetch-depth: 0   # full history + tags, so the Full Changelog compare base resolves

      - name: Install Rust (stable MSVC)
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build release
        run: cargo build --release --locked

      - name: Stage artifacts (+ SHA256)
        shell: pwsh
        run: |
          New-Item -ItemType Directory dist | Out-Null
          Copy-Item target/release/ods.exe, target/release/ods-gui.exe dist/
          foreach ($f in 'ods.exe', 'ods-gui.exe') {
            (Get-FileHash "dist/$f" -Algorithm SHA256).Hash | Out-File "dist/$f.sha256" -Encoding ascii
          }

      - name: Publish / update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = '${{ github.event.inputs.tag || github.ref_name }}'
          $repo = '${{ github.repository }}'
          $assets = 'dist/ods.exe', 'dist/ods-gui.exe', 'dist/ods.exe.sha256', 'dist/ods-gui.exe.sha256'

          # Release notes = this version's CHANGELOG section (the short changelog),
          # then a Full Changelog compare link at the bottom. Fall back to a bare
          # title if the tag has no matching CHANGELOG entry.
          $ver = $tag.TrimStart('v')
          $md = Get-Content -Raw CHANGELOG.md
          $m = [regex]::Match($md, "(?ms)^##\s*\[$([regex]::Escape($ver))\].*?(?=^##\s*\[|\z)")
          $body = if ($m.Success) { (($m.Value.Trim() -split "`n", 2)[1]).Trim() } else { "Release $tag." }

          # Compare base: the highest v*.*.* tag that isn't this one (needs fetch-depth: 0).
          $prev = @(git tag --list 'v*.*.*' --sort=v:refname | Where-Object { $_ -ne $tag }) | Select-Object -Last 1
          $full = if ($prev) { "https://github.com/$repo/compare/$prev...$tag" } else { "https://github.com/$repo/commits/$tag" }

          $notes = "$body`n`n**Full Changelog**: $full"
          Set-Content -Path notes.md -Value $notes -Encoding utf8

          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "ods $tag" --notes-file notes.md @assets
          } else {
            gh release edit $tag --notes-file notes.md
            gh release upload $tag @assets --clobber
          }
